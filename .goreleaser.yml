version: 2

project_name: clowk-hep3

before:
  hooks:
    - go mod tidy

builds:
  - id: clowk-hep3
    main: ./cmd/clowk-hep3
    binary: clowk-hep3
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: clowk-hep3
    ids:
      - clowk-hep3
    name_template: "clowk-hep3_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: thadeu
    name: clowk-hep3
  draft: false
  prerelease: auto
